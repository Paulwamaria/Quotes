
<div class="quote-details text-white">
  <div class="row">
    <div class="col-md-4 detail-item">
      <h4 class="text-info">Submission history</h4>
      <p>{{quote.submitDate | dateCount}}</p>
    </div>
    <div class="col-md-2 detail-item">
      <h4 class="text-info">Author</h4>
      <p>{{quote.authorName}}</p>
    </div>
    <div class="col-md-2 detail-item">
      <h4 class="text-info">Likes</h4>
      <p>{{quote.upVot}}</p>
    </div>
    <div class="col-md-2 detail-item">
      <h4 class="text-info">Dislikes</h4>
      <p>{{quote.downVot}}</p>
    </div>
    <div class="col-md-2 detail-item">
      <h4 class="text-info">Submitted by</h4>
      <p>{{quote.submitterName}}</p>
    </div>
    <div class="col-12 about">
      <h3 class="text-info">About Quote</h3>
      <p>{{quote.description}}</p>
    </div>
  </div>
  
  <div class="detail-actions">
    <button (click)="updateVote(true)" class="btn btn-info btn-sm">Like</button>
    <button (click)="updateVote(false)" class="btn btn-outline-light btn-sm">Dislike</button>
    <button (click)="quoteRemove(true)" class="btn btn-outline-danger btn-sm">Remove Quote</button>
  </div>
</div>
